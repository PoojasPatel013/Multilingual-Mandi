# .doc-healing.yml for multilingual-mandi
enabled: true

# 1. Define where the documentation lives in this repo
documentation:
  include:
    - "README.md"
    - "backend/README.md"
    - "docs/**/*.md"
  exclude:
    - "venv/**"
    - ".venv/**"
    - "backend/__pycache__/**"

# 2. Configure language validation (it's a Python backend)
languages:
  python:
    enabled: true
    timeout: 45
    # The repo has a backend folder with requirements files
    customSetup: |
      cd backend
      pip install -r requirements.txt
      pip install pytest

# 3. Validation behavior
validation:
  autoCorrect: true
  confidenceThreshold: 0.8
  blockOnFailure: true
  parallelExecution: true

# 4. PR notifications
notifications:
  prComments: true
  statusChecks: true
  reviewComments: true
